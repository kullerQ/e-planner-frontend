services:
  frontend:
    image: e-planner-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      API_URL: ${API_URL:-http://api:8000}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
    networks:
      - back_default

networks:
  back_default:
    external: true
