services:
  frontend:
    image: e-planner-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000/api}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      API_DEBUG_LOGS: ${API_DEBUG_LOGS:-false}
      NEXT_PUBLIC_API_DEBUG_LOGS: ${API_DEBUG_LOGS:-false}
    networks:
      - shared_backend_network
    command: >
      sh -c "echo [frontend] NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL && echo [frontend] JWT_SECRET=$JWT_SECRET && echo [frontend] API_DEBUG_LOGS=$API_DEBUG_LOGS && echo [frontend] NEXT_PUBLIC_API_DEBUG_LOGS=$NEXT_PUBLIC_API_DEBUG_LOGS && node server.js"

networks:
  # Change to the shared network: frontend and backend must be in the same network.
  # Create it if needed: docker network create eplanner-shared-network
  shared_backend_network:
    external: true
    name: ${SHARED_BACKEND_NETWORK:-eplanner-shared-network}
